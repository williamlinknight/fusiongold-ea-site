<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0D1A"/>
      <stop offset="50%" style="stop-color:#16213E"/>
      <stop offset="100%" style="stop-color:#1A1A2E"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#B8962A"/>
      <stop offset="50%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#F0D060"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid lines -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(212,175,55,0.08)" stroke-width="1"/>
  <line x1="0" y1="472" x2="1200" y2="472" stroke="rgba(212,175,55,0.08)" stroke-width="1"/>
  <line x1="0" y1="158" x2="1200" y2="158" stroke="rgba(212,175,55,0.08)" stroke-width="1"/>
  <!-- Equity curve -->
  <polyline points="100,472 250,420 400,440 550,340 700,360 850,280 1000,250 1100,230" fill="none" stroke="#D4AF37" stroke-width="3" opacity="0.6"/>
  <polyline points="100,472 250,420 400,440 550,340 700,360 850,280 1000,250 1100,230" fill="url(#gold)" opacity="0.06" stroke="none"/>
  <!-- Lighthouse icon -->
  <text x="100" y="120" font-family="serif" font-size="60" font-weight="bold" fill="url(#gold)">⟡</text>
  <!-- Brand -->
  <text x="100" y="200" font-family="'Noto Sans JP',sans-serif" font-size="64" font-weight="800" fill="url(#gold)">FusionGold M5</text>
  <text x="100" y="260" font-family="'Noto Sans JP',sans-serif" font-size="28" fill="#8A8A9A" letter-spacing="4">XAUUSD 専用自動売買EA</text>
  <!-- Stats line -->
  <text x="100" y="340" font-family="monospace" font-size="18" fill="#D4AF37">IC Markets · Raw Trading</text>
  <text x="420" y="340" font-family="monospace" font-size="18" fill="#8A8A9A">|</text>
  <text x="450" y="340" font-family="monospace" font-size="18" fill="#8A8A9A">Forward Test Running</text>
  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(255,255,255,0.02)"/>
  <text x="600" y="610" font-family="'Noto Sans JP',sans-serif" font-size="14" fill="#8A8A9A" text-anchor="middle">リアルタイム口座公開中 · 完全透明性</text>
</svg>
